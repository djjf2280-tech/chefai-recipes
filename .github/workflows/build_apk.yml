name: Build ChefAI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: ChefAI-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 60