name: 🍳 Build ChefAI APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🏗️ Build Debug APK
        run: flutter build apk --debug

      - name: 🚀 Build Release APK
        run: flutter build apk --release --no-shrink

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ChefAI-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ChefAI-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: ✅ Build Summary
        run: |
          echo "### 🎉 APK успешно собран!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Файл | Размер |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| app-debug.apk | $(du -sh build/app/outputs/flutter-apk/app-debug.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| app-release.apk | $(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Скачай APK из раздела **Artifacts** выше" >> $GITHUB_STEP_SUMMARY
